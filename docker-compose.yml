version: "3.8"

services:

  api:
    build: ./ConstructionService
    container_name: construction-api
    ports:
      - "5000:8080"
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: construction-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: constructiondb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: