apiVersion: apps/v1
kind: Deployment
metadata:
  name: construction-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: construction-api

  template:
    metadata:
      labels:
        app: construction-api

    spec:
      containers:
      - name: construction-api
        image: construction-service
        ports:
        - containerPort: 8080